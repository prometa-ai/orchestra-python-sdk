{{- include "prometa-runtime.validateValues" . }}
{{- if .Values.migration.compatibilityCheck }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "prometa-runtime.fullname" . }}-compatibility
  labels:
    {{- include "prometa-runtime.labels" . | nindent 4 }}
    app.kubernetes.io/component: compatibility
  annotations:
    helm.sh/hook: pre-install,pre-upgrade,pre-rollback
    helm.sh/hook-weight: "10"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  backoffLimit: {{ .Values.migration.backoffLimit }}
  activeDeadlineSeconds: {{ .Values.migration.activeDeadlineSeconds }}
  ttlSecondsAfterFinished: {{ .Values.migration.ttlSecondsAfterFinished }}
  template:
    metadata:
      labels:
        {{- include "prometa-runtime.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: compatibility
        prometa.io/database-maintenance: "true"
    spec:
      restartPolicy: Never
      serviceAccountName: {{ .Values.migration.serviceAccountName | quote }}
      automountServiceAccountToken: false
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: compatibility
          image: {{ include "prometa-runtime.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["prometa-runtime-postgres-compatibility"]
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          env:
            - name: PROMETA_RUNTIME_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "prometa-runtime.migrationSecretName" . | quote }}
                  key: {{ .Values.migration.databaseUrlKey | quote }}
          resources:
            {{- toYaml .Values.migration.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 32Mi
{{- end }}
