name: Publish

# ---------------------------------------------------------------------------
# Builds the wheel + sdist and publishes to PyPI when a `v*` tag lands.
#
# Trigger surface:
#   - push of a tag matching `v*` (e.g. `v0.4.0`) — the standard release
#     path; `release.yml` creates this tag for you.
#   - manual `workflow_dispatch` — dry-run: builds + uploads artifacts,
#     skips publish.
#
# Publishing uses PyPI Trusted Publishing (OIDC) — no API token to
# rotate. One-time setup on PyPI:
#   https://pypi.org/manage/project/prometa-sdk/settings/publishing/
# Add a (pending) publisher pointing at:
#   - Owner:           prometa-ai
#   - Repository:      orchestra-python-sdk
#   - Workflow file:   publish.yml
#   - Environment:     pypi
# Until that's bound, every tag push gets all the way through Build +
# Check, then the Publish step's OIDC exchange fails — keeping the
# workflow honest without leaking artifacts.
# ---------------------------------------------------------------------------

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write     # required for OIDC exchange with PyPI

jobs:
  publish:
    runs-on: ubuntu-latest
    # GitHub Environment gate — lets you require reviewers on a real
    # publish tag without blocking workflow_dispatch dry-runs. Also the
    # name PyPI's trusted publisher is bound to (changing it here means
    # re-binding on PyPI).
    environment:
      name: pypi
      url: https://pypi.org/p/prometa-sdk
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: python -m pip install --upgrade pip build twine

      - name: Verify version in pyproject matches tag
        # Tag-triggered runs only. Manual workflow_dispatch builds the
        # tree as-is without enforcing a tag/version match (operator can
        # inspect the artifact before tagging).
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          set -euo pipefail
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PYPROJECT_VERSION=$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml","rb"))["project"]["version"])')
          if [ "$TAG_VERSION" != "$PYPROJECT_VERSION" ]; then
            echo "::error::tag version ($TAG_VERSION) does not match pyproject version ($PYPROJECT_VERSION)"
            echo "::error::either bump pyproject before tagging, or run release.yml so it manages both"
            exit 1
          fi

      - name: Build sdist + wheel
        run: python -m build

      - name: Check artifacts
        run: python -m twine check dist/*

      - name: Upload build artifacts (always)
        # Captured for both tag pushes and dry-run dispatches so
        # operators can download + inspect before / after publish.
        uses: actions/upload-artifact@v4
        with:
          name: prometa-sdk
          path: dist/*

      - name: Publish to PyPI (trusted publishing)
        # Tag-triggered only. workflow_dispatch builds + uploads to the
        # Actions artifact tab but stops before publish.
        if: startsWith(github.ref, 'refs/tags/v')
        uses: pypa/gh-action-pypi-publish@release/v1
