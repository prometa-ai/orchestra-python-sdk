{{- include "prometa-runtime.validateValues" . }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "prometa-runtime.fullname" . }}
  labels:
    {{- include "prometa-runtime.labels" . | nindent 4 }}
    app.kubernetes.io/component: runtime
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  revisionHistoryLimit: {{ .Values.revisionHistoryLimit }}
  strategy:
    {{- toYaml .Values.strategy | nindent 4 }}
  selector:
    matchLabels:
      {{- include "prometa-runtime.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: runtime
  template:
    metadata:
      {{- if or .Values.runtimeConfig.rolloutId .Values.serverTls.rolloutId .Values.productionProfile.enabled .Values.podAnnotations }}
      annotations:
        {{- with .Values.runtimeConfig.rolloutId }}
        prometa.io/runtime-config-rollout-id: {{ . | quote }}
        {{- end }}
        {{- with .Values.serverTls.rolloutId }}
        prometa.io/server-tls-rollout-id: {{ . | quote }}
        {{- end }}
        {{- if .Values.productionProfile.enabled }}
        prometa.io/production-profile-id: {{ .Values.productionProfile.profileId | quote }}
        {{- end }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- end }}
      labels:
        {{- include "prometa-runtime.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: runtime
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "prometa-runtime.serviceAccountName" . }}
      automountServiceAccountToken: {{ .Values.serviceAccount.automountServiceAccountToken }}
      terminationGracePeriodSeconds: {{ .Values.gracefulShutdown.terminationGracePeriodSeconds }}
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: runtime
          image: {{ include "prometa-runtime.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          ports:
            - name: {{ ternary "https" "http" .Values.serverTls.enabled }}
              containerPort: {{ .Values.containerPort }}
              protocol: TCP
          env:
            - name: PORT
              value: {{ .Values.containerPort | quote }}
            - name: PROMETA_RUNTIME_HOST
              value: "0.0.0.0"
            - name: PROMETA_RUNTIME_CONFIG
              value: {{ printf "/etc/prometa-runtime/%s" .Values.runtimeConfig.targetFile | quote }}
            - name: PROMETA_RUNTIME_EDGE_OVERLOAD_CONTRACT
              value: {{ .Values.runtimeEdge.overloadContract | quote }}
            {{- if .Values.serverTls.enabled }}
            - name: PROMETA_RUNTIME_SERVER_TLS_CERT_FILE
              value: /etc/prometa-runtime-server-tls/tls.crt
            - name: PROMETA_RUNTIME_SERVER_TLS_KEY_FILE
              value: /etc/prometa-runtime-server-tls/tls.key
            - name: PROMETA_RUNTIME_SERVER_TLS_REQUIRE_CLIENT_CERTIFICATE
              value: {{ .Values.serverTls.requireClientCertificate | quote }}
            {{- if .Values.serverTls.requireClientCertificate }}
            - name: PROMETA_RUNTIME_SERVER_TLS_CLIENT_CA_FILE
              value: /etc/prometa-runtime-server-tls/client-ca.crt
            - name: PROMETA_RUNTIME_PROBE_TLS_CERT_FILE
              value: /etc/prometa-runtime-probe-tls/tls.crt
            - name: PROMETA_RUNTIME_PROBE_TLS_KEY_FILE
              value: /etc/prometa-runtime-probe-tls/tls.key
            - name: PROMETA_RUNTIME_PROBE_TLS_CA_FILE
              value: /etc/prometa-runtime-probe-tls/ca.crt
            {{- end }}
            {{- end }}
            - name: PROMETA_RUNTIME_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.credentials.existingSecret | quote }}
                  key: {{ .Values.credentials.databaseUrlKey | quote }}
            - name: PROMETA_RUNTIME_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.credentials.existingSecret | quote }}
                  key: {{ .Values.credentials.apiTokenKey | quote }}
            - name: MODEL_GATEWAY_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.credentials.existingSecret | quote }}
                  key: {{ .Values.credentials.modelGatewayApiKeyKey | quote }}
                  optional: {{ .Values.credentials.modelGatewayApiKeyOptional }}
            - name: ORCHESTRA_RUNTIME_RECEIPT_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.credentials.existingSecret | quote }}
                  key: {{ .Values.credentials.receiptApiKeyKey | quote }}
                  optional: {{ .Values.credentials.receiptApiKeyOptional }}
            - name: ORCHESTRA_RUNTIME_CONTROL_PLANE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.credentials.existingSecret | quote }}
                  key: {{ .Values.credentials.controlPlaneApiKeyKey | quote }}
                  optional: {{ .Values.credentials.controlPlaneApiKeyOptional }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- if gt (int .Values.gracefulShutdown.preStopSleepSeconds) 0 }}
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep {{ .Values.gracefulShutdown.preStopSleepSeconds }}"]
          {{- end }}
          startupProbe:
            {{- if and .Values.serverTls.enabled .Values.serverTls.requireClientCertificate }}
            exec:
              command:
                - python
                - -c
                - {{ printf "import http.client,ssl,sys;c=ssl.create_default_context(cafile='/etc/prometa-runtime-probe-tls/ca.crt');c.check_hostname=False;c.load_cert_chain('/etc/prometa-runtime-probe-tls/tls.crt','/etc/prometa-runtime-probe-tls/tls.key');h=http.client.HTTPSConnection('127.0.0.1',%d,timeout=%d,context=c);h.request('GET','/readyz');r=h.getresponse();sys.exit(0 if r.status == 200 else 1)" (int .Values.containerPort) (int .Values.probes.startup.timeoutSeconds) | quote }}
            {{- else }}
            httpGet:
              path: /readyz
              port: {{ ternary "https" "http" .Values.serverTls.enabled }}
              {{- if .Values.serverTls.enabled }}
              scheme: HTTPS
              {{- end }}
            {{- end }}
            {{- toYaml .Values.probes.startup | nindent 12 }}
          livenessProbe:
            {{- if and .Values.serverTls.enabled .Values.serverTls.requireClientCertificate }}
            exec:
              command:
                - python
                - -c
                - {{ printf "import http.client,ssl,sys;c=ssl.create_default_context(cafile='/etc/prometa-runtime-probe-tls/ca.crt');c.check_hostname=False;c.load_cert_chain('/etc/prometa-runtime-probe-tls/tls.crt','/etc/prometa-runtime-probe-tls/tls.key');h=http.client.HTTPSConnection('127.0.0.1',%d,timeout=%d,context=c);h.request('GET','/healthz');r=h.getresponse();sys.exit(0 if r.status == 200 else 1)" (int .Values.containerPort) (int .Values.probes.liveness.timeoutSeconds) | quote }}
            {{- else }}
            httpGet:
              path: /healthz
              port: {{ ternary "https" "http" .Values.serverTls.enabled }}
              {{- if .Values.serverTls.enabled }}
              scheme: HTTPS
              {{- end }}
            {{- end }}
            {{- toYaml .Values.probes.liveness | nindent 12 }}
          readinessProbe:
            {{- if and .Values.serverTls.enabled .Values.serverTls.requireClientCertificate }}
            exec:
              command:
                - python
                - -c
                - {{ printf "import http.client,ssl,sys;c=ssl.create_default_context(cafile='/etc/prometa-runtime-probe-tls/ca.crt');c.check_hostname=False;c.load_cert_chain('/etc/prometa-runtime-probe-tls/tls.crt','/etc/prometa-runtime-probe-tls/tls.key');h=http.client.HTTPSConnection('127.0.0.1',%d,timeout=%d,context=c);h.request('GET','/readyz');r=h.getresponse();sys.exit(0 if r.status == 200 else 1)" (int .Values.containerPort) (int .Values.probes.readiness.timeoutSeconds) | quote }}
            {{- else }}
            httpGet:
              path: /readyz
              port: {{ ternary "https" "http" .Values.serverTls.enabled }}
              {{- if .Values.serverTls.enabled }}
              scheme: HTTPS
              {{- end }}
            {{- end }}
            {{- toYaml .Values.probes.readiness | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: runtime-config
              mountPath: /etc/prometa-runtime
              readOnly: true
            - name: tmp
              mountPath: /tmp
            {{- if .Values.serverTls.enabled }}
            - name: server-tls
              mountPath: /etc/prometa-runtime-server-tls
              readOnly: true
            {{- if .Values.serverTls.requireClientCertificate }}
            - name: probe-client-tls
              mountPath: /etc/prometa-runtime-probe-tls
              readOnly: true
            {{- end }}
            {{- end }}
            {{- with .Values.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
      volumes:
        - name: runtime-config
          {{- if .Values.runtimeConfig.existingSecret }}
          secret:
            secretName: {{ .Values.runtimeConfig.existingSecret | quote }}
            items:
              - key: {{ .Values.runtimeConfig.key | quote }}
                path: {{ .Values.runtimeConfig.targetFile | quote }}
          {{- else }}
          configMap:
            name: {{ .Values.runtimeConfig.existingConfigMap | quote }}
            items:
              - key: {{ .Values.runtimeConfig.key | quote }}
                path: {{ .Values.runtimeConfig.targetFile | quote }}
          {{- end }}
        - name: tmp
          emptyDir:
            sizeLimit: 64Mi
        {{- if .Values.serverTls.enabled }}
        - name: server-tls
          secret:
            secretName: {{ .Values.serverTls.existingSecret | quote }}
            defaultMode: 0440
            items:
              - key: {{ .Values.serverTls.certificateKey | quote }}
                path: tls.crt
              - key: {{ .Values.serverTls.privateKeyKey | quote }}
                path: tls.key
              {{- if .Values.serverTls.requireClientCertificate }}
              - key: {{ .Values.serverTls.clientCaKey | quote }}
                path: client-ca.crt
              {{- end }}
        {{- if .Values.serverTls.requireClientCertificate }}
        - name: probe-client-tls
          secret:
            secretName: {{ .Values.serverTls.probeClient.existingSecret | quote }}
            defaultMode: 0440
            items:
              - key: {{ .Values.serverTls.probeClient.certificateKey | quote }}
                path: tls.crt
              - key: {{ .Values.serverTls.probeClient.privateKeyKey | quote }}
                path: tls.key
              - key: {{ .Values.serverTls.probeClient.caKey | quote }}
                path: ca.crt
        {{- end }}
        {{- end }}
        {{- with .Values.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
