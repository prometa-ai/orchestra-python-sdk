name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package + dev tools
        run: pip install ".[dev]"

      - name: Ruff
        run: >-
          ruff check prometa tests
          deploy/reference-runtime/ci/topology_fixture.py
          deploy/reference-runtime/ci/topology_probe.py
          deploy/reference-runtime/ci/topology_mcp_server.py

      - name: Pytest
        run: pytest -q

      - name: Dependency-free import smoke test
        run: python -c "from prometa import Prometa; import prometa.runtime; assert Prometa.__name__ == 'Prometa'"

  runtime-contract:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: runtime_test
          POSTGRES_PASSWORD: runtime_test
          POSTGRES_DB: runtime_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U runtime_test -d runtime_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      PROMETA_RUNTIME_TEST_POSTGRES_DSN: >-
        postgresql://runtime_test:runtime_test@localhost:5432/runtime_test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install runtime extra + dev tools
        run: pip install ".[dev,runtime-postgres]"

      - name: Install matching PostgreSQL client tools
        run: |
          sudo apt-get update
          sudo apt-get install --yes postgresql-client-16
          pg_dump --version

      - name: Ruff
        run: >-
          ruff check prometa/runtime
          tests/test_runtime_*.py
          tests/test_promotion_attestation.py
          deploy/reference-runtime/ci/topology_fixture.py
          deploy/reference-runtime/ci/topology_probe.py
          deploy/reference-runtime/ci/topology_mcp_server.py

      - name: Runtime trust conformance
        run: >-
          pytest -q
          tests/test_runtime_*.py
          tests/test_promotion_attestation.py

  runtime-mcp:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install governed MCP runtime extra
        run: pip install ".[dev,runtime-mcp]"

      - name: Verify MCP governance and official transports
        run: >-
          pytest -q
          tests/test_runtime_mcp.py
          tests/test_runtime_mcp_transport.py

      - name: Dependency boundary and lint
        run: >-
          ruff check
          prometa/runtime/mcp.py
          tests/test_runtime_mcp.py
          tests/test_runtime_mcp_transport.py
          tests/runtime_mcp_stdio_server.py
          deploy/reference-runtime/ci/topology_mcp_server.py

  runtime-upgrade-rollback:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: runtime_test
          POSTGRES_PASSWORD: runtime_test
          POSTGRES_DB: runtime_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U runtime_test -d runtime_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      PROMETA_RUNTIME_TEST_POSTGRES_DSN: >-
        postgresql://runtime_test:runtime_test@localhost:5432/runtime_test
      PROMETA_RUNTIME_UPGRADE_REPORT: runtime-upgrade-rollback.json
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install current runtime host and test tools
        run: pip install ".[dev,runtime-host]"

      - name: Exercise source baseline upgrade and prior-bundle rollback
        run: deploy/reference-runtime/ci/upgrade-rollback-drill.sh

      - uses: actions/upload-artifact@v4
        with:
          name: runtime-upgrade-rollback
          path: runtime-upgrade-rollback.json

  runtime-host-image:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install host conformance runner
        run: pip install ".[dev,runtime-host]"

      - name: Render reference Compose topology
        env:
          PROMETA_RUNTIME_POSTGRES_PASSWORD: ci-runtime-password
          PROMETA_RUNTIME_API_TOKEN: ci-runtime-token-0123456789abcdefghijkl
        run: docker compose -f deploy/reference-runtime/compose.yaml config >/dev/null

      - name: Build non-root reference host image
        run: >-
          docker build
          -f deploy/reference-runtime/Dockerfile
          -t prometa-runtime-host:${{ github.sha }}
          .

      - name: Verify image identity and installed API
        run: |
          set -euo pipefail
          test "$(docker run --rm --entrypoint id prometa-runtime-host:${{ github.sha }} -u)" = "10001"
          docker run --rm --entrypoint python prometa-runtime-host:${{ github.sha }} \
            -c "import prometa; from prometa.runtime import RUNTIME_POSTGRES_SCHEMA_VERSION, RUNTIME_TASK_LIFECYCLE_VERSION, PostgresMcpAuditSink, PostgresMcpIdempotencyStore, PostgresRuntimeTaskStore, ReferenceRuntimeHost, check_postgres_runtime_compatibility, official_mcp_transport_available, verify_postgres_runtime_integrity; assert prometa.__version__ == '0.18.0'; assert RUNTIME_TASK_LIFECYCLE_VERSION == 1; assert RUNTIME_POSTGRES_SCHEMA_VERSION == 6; assert official_mcp_transport_available(); assert callable(check_postgres_runtime_compatibility); assert callable(verify_postgres_runtime_integrity)"

      - name: Run deployment profile through fresh host containers
        run: >-
          prometa-runtime-conformance
          --profile deployment
          --driver-name reference-host-container
          --command "docker run --rm -i --entrypoint prometa-runtime-host-conformance-driver prometa-runtime-host:${{ github.sha }}"
          --compact
          --output runtime-host-conformance.json

      - uses: actions/upload-artifact@v4
        with:
          name: runtime-host-conformance
          path: runtime-host-conformance.json

  runtime-host-chart:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4

      - name: Lint production reference values
        run: >-
          helm lint --strict
          deploy/reference-runtime/chart
          -f deploy/reference-runtime/chart/values.production.example.yaml

      - name: Lint governed MCP reference values
        run: >-
          helm lint --strict
          deploy/reference-runtime/chart
          -f deploy/reference-runtime/chart/values.mcp.example.yaml

      - name: Verify fail-closed values and render variants
        run: |
          set -euo pipefail
          chart=deploy/reference-runtime/chart
          example=$chart/values.production.example.yaml
          mcp_example=$chart/values.mcp.example.yaml

          if helm template missing-inputs "$chart" >/dev/null 2>&1; then
            echo "chart rendered without external config and credential references" >&2
            exit 1
          fi

          if helm template missing-egress "$chart" \
            --set runtimeConfig.existingSecret=runtime-config \
            --set credentials.existingSecret=runtime-credentials \
            >/dev/null 2>&1; then
            echo "chart rendered enabled policies without explicit egress" >&2
            exit 1
          fi

          if helm template reserved-env "$chart" -f "$example" \
            --set 'extraEnv[0].name=PROMETA_RUNTIME_API_TOKEN' \
            --set 'extraEnv[0].value=shadow' >/dev/null 2>&1; then
            echo "chart allowed a reserved environment override" >&2
            exit 1
          fi

          if helm template unacknowledged-backup "$chart" -f "$example" \
            --set backup.acknowledgeSensitiveData=false >/dev/null 2>&1; then
            echo "chart enabled sensitive backups without acknowledgement" >&2
            exit 1
          fi

          helm template production "$chart" -f "$example" >runtime-chart.yaml
          test "$(grep -c '^kind: NetworkPolicy$' runtime-chart.yaml)" = "3"
          test "$(grep -c '^kind: Job$' runtime-chart.yaml)" = "2"
          test "$(grep -c '^kind: CronJob$' runtime-chart.yaml)" = "1"
          grep -q '^kind: HorizontalPodAutoscaler$' runtime-chart.yaml
          grep -q '^kind: PodDisruptionBudget$' runtime-chart.yaml
          grep -q 'automountServiceAccountToken: false' runtime-chart.yaml
          grep -q 'readOnlyRootFilesystem: true' runtime-chart.yaml
          grep -q 'helm.sh/hook: pre-install,pre-upgrade' runtime-chart.yaml
          grep -q 'helm.sh/hook: pre-install,pre-upgrade,pre-rollback' runtime-chart.yaml
          grep -q 'prometa-runtime-postgres-compatibility' runtime-chart.yaml
          grep -q 'prometa.io/runtime-config-rollout-id: "deployment-prod-v1"' runtime-chart.yaml
          grep -q 'name: ORCHESTRA_RUNTIME_CONTROL_PLANE_API_KEY' runtime-chart.yaml
          grep -q 'control-plane-api-key' runtime-chart.yaml
          grep -q 'name: ORCHESTRA_RUNTIME_RECEIPT_API_KEY' runtime-chart.yaml
          grep -q 'receipt-api-key' runtime-chart.yaml
          grep -q 'tenant-runtime-encrypted-backups' runtime-chart.yaml
          grep -q 'tenant-runtime-backup-database' runtime-chart.yaml
          if grep -q '^kind: Secret$' runtime-chart.yaml; then
            echo "chart must reference, not create, credentials" >&2
            exit 1
          fi

          helm template governed-mcp "$chart" -f "$mcp_example" >runtime-chart-mcp.yaml
          grep -q 'name: MCP_INTEGRATION_AUTHORIZATION' runtime-chart-mcp.yaml
          grep -q 'name: tenant-runtime-mcp-credentials' runtime-chart-mcp.yaml
          grep -q 'port: 8443' runtime-chart-mcp.yaml
          if grep -q '^kind: Secret$' runtime-chart-mcp.yaml; then
            echo "MCP chart values must reference, not create, credentials" >&2
            exit 1
          fi

          helm template configmap "$chart" \
            --set runtimeConfig.existingConfigMap=runtime-config \
            --set credentials.existingSecret=runtime-credentials \
            --set migration.enabled=false \
            --set migration.compatibilityCheck=false \
            --set networkPolicy.enabled=false >runtime-chart-configmap.yaml
          grep -q 'configMap:' runtime-chart-configmap.yaml
          if grep -q '^kind: Job$' runtime-chart-configmap.yaml; then
            echo "disabled database maintenance unexpectedly rendered a Job" >&2
            exit 1
          fi

          helm template external-migration "$chart" -f "$example" \
            --set migration.enabled=false >runtime-chart-external-migration.yaml
          test "$(grep -c '^kind: Job$' runtime-chart-external-migration.yaml)" = "1"
          grep -q 'prometa-runtime-postgres-compatibility' runtime-chart-external-migration.yaml
          if grep -q 'prometa-runtime-postgres-init' runtime-chart-external-migration.yaml; then
            echo "externally managed migration unexpectedly rendered the mutating job" >&2
            exit 1
          fi

          if helm template reserved-receipt-env "$chart" -f "$example" \
            --set 'extraEnv[0].name=ORCHESTRA_RUNTIME_RECEIPT_API_KEY' \
            --set 'extraEnv[0].value=shadow' >/dev/null 2>&1; then
            echo "chart allowed the reserved receipt API key override" >&2
            exit 1
          fi

          if helm template reserved-control-plane-env "$chart" -f "$example" \
            --set 'extraEnv[0].name=ORCHESTRA_RUNTIME_CONTROL_PLANE_API_KEY' \
            --set 'extraEnv[0].value=shadow' >/dev/null 2>&1; then
            echo "chart allowed the reserved control-plane API key override" >&2
            exit 1
          fi

      - name: Package tenant runtime chart
        run: helm package deploy/reference-runtime/chart --destination dist

      - uses: actions/upload-artifact@v4
        with:
          name: prometa-runtime-chart
          path: dist/prometa-runtime-*.tgz

  runtime-topology-certification:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: azure/setup-helm@v4

      - uses: azure/setup-kubectl@v4
        with:
          version: "v1.34.8"

      - name: Install runtime host and test tools
        run: pip install ".[dev,runtime-host]"

      - name: Install checksum-verified K3d
        run: |
          deploy/reference-runtime/ci/install-k3d.sh "$RUNNER_TEMP/k3d"
          echo "K3D=$RUNNER_TEMP/k3d" >>"$GITHUB_ENV"

      - name: Certify the pinned K3s kube-router reference topology
        env:
          PROMETA_RUNTIME_TOPOLOGY_REPORT: runtime-topology-certification.json
          BUILDKIT_PROGRESS: plain
        run: deploy/reference-runtime/ci/topology-certification.sh

      - uses: actions/upload-artifact@v4
        with:
          name: runtime-topology-certification
          path: runtime-topology-certification.json

  runtime-mcp-topology-certification:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: azure/setup-helm@v4

      - uses: azure/setup-kubectl@v4
        with:
          version: "v1.34.8"

      - name: Install runtime host and test tools
        run: pip install ".[dev,runtime-host]"

      - name: Install checksum-verified K3d
        run: |
          deploy/reference-runtime/ci/install-k3d.sh "$RUNNER_TEMP/k3d"
          echo "K3D=$RUNNER_TEMP/k3d" >>"$GITHUB_ENV"

      - name: Certify the governed MCP K3s reference topology
        env:
          PROMETA_RUNTIME_TOPOLOGY_PROFILE: deploy/reference-runtime/topology-profiles.mcp.json
          PROMETA_RUNTIME_TOPOLOGY_REPORT: runtime-mcp-topology-certification.json
          PROMETA_RUNTIME_TOPOLOGY_CLUSTER: prometa-runtime-mcp-topology
          BUILDKIT_PROGRESS: plain
        run: deploy/reference-runtime/ci/topology-certification.sh

      - uses: actions/upload-artifact@v4
        with:
          name: runtime-mcp-topology-certification
          path: runtime-mcp-topology-certification.json
