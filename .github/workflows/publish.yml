# Trusted publishing (OIDC → PyPI):
#   GitHub: Settings → Environments → `pypi` (matches `environment:` below).
#   PyPI: https://pypi.org/manage/project/prometa-sdk/settings/publishing/
#     trusted publisher — workflow file `publish.yml`, environment `pypi`.
# For TestPyPI only, add under `pypa/gh-action-pypi-publish`:
#   repository-url: https://test.pypi.org/legacy/
#
# Tags `v*` → build + publish. `workflow_dispatch` from the default branch
# builds artifacts only (ref stays `refs/heads/main`). `release.yml` ends by
# dispatching this workflow with `--ref vX.Y.Z` so OIDC publish runs on the tag.

name: Publish package

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Build only, skip publish"
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/prometa-sdk
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify tag matches pyproject version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          set -euo pipefail
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PYPROJECT_VERSION=$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml","rb"))["project"]["version"])')
          if [ "$TAG_VERSION" != "$PYPROJECT_VERSION" ]; then
            echo "::error::tag version ($TAG_VERSION) does not match pyproject ($PYPROJECT_VERSION)"
            exit 1
          fi

      - name: Install build tooling
        run: python -m pip install --upgrade pip build twine

      - name: Build sdist + wheel
        run: python -m build

      - name: Check artifacts
        run: python -m twine check dist/*

      - uses: actions/upload-artifact@v4
        with:
          name: prometa-sdk
          path: dist/*

      - name: Publish to PyPI
        if: ${{ startsWith(github.ref, 'refs/tags/v') && (github.event_name != 'workflow_dispatch' || github.event.inputs.dry_run != 'true') }}
        uses: pypa/gh-action-pypi-publish@release/v1
