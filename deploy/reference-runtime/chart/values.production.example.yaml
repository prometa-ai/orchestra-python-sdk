# Replace these names with objects managed by your secret/config delivery
# system. The chart deliberately does not create either object.
runtimeConfig:
  # Use an immutable object per freshly authorized deployment, including a
  # rollback to prior bundle bytes.
  existingSecret: tenant-runtime-release-deployment-prod-v1
  rolloutId: deployment-prod-v1

credentials:
  existingSecret: tenant-runtime-credentials

replicaCount: 2

image:
  repository: registry.example.com/orchestra/prometa-runtime-host
  tag: "0.18.3"

serviceAccount:
  annotations:
    # Replace with the workload identity annotation for your cluster/provider.
    example.com/workload-identity: tenant-runtime

podDisruptionBudget:
  enabled: true
  minAvailable: 1

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 8

topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: topology.kubernetes.io/zone
    whenUnsatisfiable: ScheduleAnyway
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: prometa-runtime

networkPolicy:
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: tenant-gateway
          podSelector:
            matchLabels:
              app.kubernetes.io/name: tenant-ai-gateway
      ports:
        - protocol: TCP
          port: 8080
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: tenant-data
          podSelector:
            matchLabels:
              app.kubernetes.io/name: postgresql
      ports:
        - protocol: TCP
          port: 5432
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: tenant-models
          podSelector:
            matchLabels:
              app.kubernetes.io/name: model-gateway
      ports:
        - protocol: TCP
          port: 8000

migration:
  networkPolicy:
    egress:
      - to:
          - namespaceSelector:
              matchLabels:
                kubernetes.io/metadata.name: tenant-data
            podSelector:
              matchLabels:
                app.kubernetes.io/name: postgresql
        ports:
          - protocol: TCP
            port: 5432

# The referenced PVC must use tenant-approved encryption, retention, replication,
# and access controls. The Secret contains dedicated least-privilege backup
# connection fields, not the runtime DSN.
backup:
  enabled: true
  acknowledgeSensitiveData: true
  image:
    repository: registry.example.com/mirrors/postgres
    tag: 16.13-alpine
  existingClaim: tenant-runtime-encrypted-backups
  existingSecret: tenant-runtime-backup-database
  schedule: "0 2 * * *"
  retentionDays: 14
  networkPolicy:
    egress:
      - to:
          - namespaceSelector:
              matchLabels:
                kubernetes.io/metadata.name: tenant-data
            podSelector:
              matchLabels:
                app.kubernetes.io/name: postgresql
        ports:
          - protocol: TCP
            port: 5432
