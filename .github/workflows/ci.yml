name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package + dev tools
        run: pip install ".[dev]"

      - name: Ruff
        run: ruff check prometa tests

      - name: Pytest
        run: pytest -q

      - name: Dependency-free import smoke test
        run: python -c "from prometa import Prometa; import prometa.runtime; assert Prometa.__name__ == 'Prometa'"

  runtime-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install runtime extra + dev tools
        run: pip install ".[dev,runtime]"

      - name: Ruff
        run: >-
          ruff check prometa/runtime
          tests/test_runtime_*.py
          tests/test_promotion_attestation.py

      - name: Runtime trust conformance
        run: >-
          pytest -q
          tests/test_runtime_*.py
          tests/test_promotion_attestation.py
