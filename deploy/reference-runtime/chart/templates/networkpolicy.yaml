{{- include "prometa-runtime.validateValues" . }}
{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "prometa-runtime.fullname" . }}
  labels:
    {{- include "prometa-runtime.labels" . | nindent 4 }}
    app.kubernetes.io/component: runtime
spec:
  podSelector:
    matchLabels:
      {{- include "prometa-runtime.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: runtime
  policyTypes:
    - Ingress
    - Egress
  ingress:
    {{- if .Values.networkPolicy.ingress }}
    {{- toYaml .Values.networkPolicy.ingress | nindent 4 }}
    {{- else }} []
    {{- end }}
  egress:
    {{- if .Values.networkPolicy.allowDNS }}
    {{- include "prometa-runtime.dnsEgress" (dict "dnsNamespaceSelector" .Values.networkPolicy.dnsNamespaceSelector) | nindent 4 }}
    {{- end }}
    {{- with .Values.networkPolicy.egress }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
    {{- if and (not .Values.networkPolicy.allowDNS) (empty .Values.networkPolicy.egress) }} []
    {{- end }}
{{- end }}
{{- if and .Values.backup.enabled .Values.backup.networkPolicy.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "prometa-runtime.fullname" . }}-backup
  labels:
    {{- include "prometa-runtime.labels" . | nindent 4 }}
    app.kubernetes.io/component: backup
spec:
  podSelector:
    matchLabels:
      {{- include "prometa-runtime.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: backup
  policyTypes:
    - Ingress
    - Egress
  ingress: []
  egress:
    {{- if .Values.backup.networkPolicy.allowDNS }}
    {{- include "prometa-runtime.dnsEgress" (dict "dnsNamespaceSelector" .Values.backup.networkPolicy.dnsNamespaceSelector) | nindent 4 }}
    {{- end }}
    {{- with .Values.backup.networkPolicy.egress }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
    {{- if and (not .Values.backup.networkPolicy.allowDNS) (empty .Values.backup.networkPolicy.egress) }} []
    {{- end }}
{{- end }}
{{- if and (or .Values.migration.enabled .Values.migration.compatibilityCheck) .Values.migration.networkPolicy.enabled }}
---
# This hook policy must remain for the complete maintenance hook sequence.
# Helm replaces it before the next operation; operators remove it after uninstall.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "prometa-runtime.fullname" . }}-migrate
  labels:
    {{- include "prometa-runtime.labels" . | nindent 4 }}
    app.kubernetes.io/component: database-maintenance
  annotations:
    helm.sh/hook: pre-install,pre-upgrade,pre-rollback
    helm.sh/hook-weight: "-10"
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  podSelector:
    matchLabels:
      {{- include "prometa-runtime.selectorLabels" . | nindent 6 }}
      prometa.io/database-maintenance: "true"
  policyTypes:
    - Ingress
    - Egress
  ingress: []
  egress:
    {{- if .Values.migration.networkPolicy.allowDNS }}
    {{- include "prometa-runtime.dnsEgress" (dict "dnsNamespaceSelector" .Values.migration.networkPolicy.dnsNamespaceSelector) | nindent 4 }}
    {{- end }}
    {{- with .Values.migration.networkPolicy.egress }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
    {{- if and (not .Values.migration.networkPolicy.allowDNS) (empty .Values.migration.networkPolicy.egress) }} []
    {{- end }}
{{- end }}
